# ShiguangAgent example configuration.
#
# This file is generated by Hub during operator onboarding.
# The operator downloads it alongside the agent binary.
#
# Fields marked [HUB-PROVIDED] are auto-filled by the Hub onboarding wizard.
# Fields marked [OPERATOR] must be set by the operator.

# [HUB-PROVIDED] Tenant identity
tenant_slug: "juezhan-yongheng"
agent_token: "sg-agent-xxxxxxxxxxxxxxxxxxxx"

# [HUB-PROVIDED] Hub connection
hub_address: "hub.shiguang.cloud:443"

# Gate (TCP relay) configuration
gate:
  banlist_file: "bans.json"
  defaults:
    max_conn_per_ip: 3
    rate_per_sec: 5
    burst: 10
    dial_timeout_ms: 5000
  routes:
    # [OPERATOR] Adjust listen/upstream to match your game server setup
    - name: "5.8-auth"
      listen: "0.0.0.0:2108"
      upstream: "127.0.0.1:2108"
      proxy_protocol: true
    - name: "5.8-world"
      listen: "0.0.0.0:7777"
      upstream: "127.0.0.1:7777"
      proxy_protocol: true

# Control (HTTP/WSS API for launcher connections)
control:
  bind: "0.0.0.0:10443"
  jwt_secret: "CHANGE_ME_AT_LEAST_32_RANDOM_CHARS"

  # [OPERATOR] PostgreSQL connection strings for your game databases
  db_58: "postgres://postgres:postgres@127.0.0.1:5432/aion_world_live?sslmode=disable"
  db_48: ""  # leave empty if only running 5.8

  # [OPERATOR] Admin credentials for the local admin panel
  admin_user: "admin"
  admin_pass: "CHANGE_ME"

  # Path to admin SPA static files (optional)
  web_dir: "web/dist"
